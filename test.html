// ── useAI.js ──────────────────────────────────
export async function callAI(system, user, onChunk) {
  const apiKey = window.BILT_API_KEY
  if (!apiKey || apiKey === 'sk-ant-your-key-here') {
    const mock = "⚠️ Add your Anthropic API key to a `.env` file as `VITE_ANTHROPIC_API_KEY=sk-ant-...` to enable AI features."
    onChunk(mock)
    return mock
  }
  try {
    const r = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true",
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system,
        messages: [{ role: "user", content: user }],
        stream: true,
      }),
    })
    const reader = r.body.getReader()
    const dec = new TextDecoder()
    let full = ""
    while (true) {
      const { done, value } = await reader.read()
      if (done) break
      for (const line of dec.decode(value).split("\n").filter(l => l.startsWith("data: "))) {
        try {
          const j = JSON.parse(line.slice(6))
          if (j.delta?.text) { full += j.delta.text; onChunk(full) }
        } catch {}
      }
    }
    return full
  } catch (e) {
    const err = "AI unavailable: " + e.message
    onChunk(err)
    return err
  }
}

function renderMd(t = "") {
  return t
    .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
    .replace(/\*(.*?)\*/g, "<em>$1</em>")
    .replace(/`(.*?)`/g, '<code style="background:#243040;padding:1px 4px;border-radius:3px;font-family:DM Mono,monospace;font-size:11px">$1</code>')
    .replace(/^### (.+)$/gm, '<div style="font-weight:700;font-size:13px;margin:10px 0 4px;color:#E8EDF2">$1</div>')
    .replace(/^## (.+)$/gm, '<div style="font-weight:800;font-size:15px;margin:14px 0 6px;color:#E8A020">$1</div>')
    .replace(/^[-•] (.+)$/gm, '<div style="display:flex;gap:7px;margin:2px 0"><span style="color:#E8A020">▸</span><span>$1</span></div>')
    .replace(/\n/g, "<br/>")
}

)

const SPill = ({ s }) => {
  const m = {
    done: { c: C.green, b: C.greenDim, l: "Done" }, approved: { c: C.green, b: C.greenDim, l: "Approved" },
    signed: { c: C.green, b: C.greenDim, l: "Signed" }, completed: { c: C.green, b: C.greenDim, l: "Completed" },
    answered: { c: C.green, b: C.greenDim, l: "Answered" }, awarded: { c: C.green, b: C.greenDim, l: "Awarded" },
    acknowledged: { c: C.green, b: C.greenDim, l: "Acknowledged" }, confirmed: { c: C.green, b: C.greenDim, l: "Confirmed" },
    "in-progress": { c: C.blue, b: C.blueDim, l: "In Progress" }, "in-review": { c: C.blue, b: C.blueDim, l: "In Review" },
    monitoring: { c: C.blue, b: C.blueDim, l: "Monitoring" }, scheduled: { c: C.purple, b: C.purpleDim, l: "Scheduled" },
    submitted: { c: C.teal, b: C.tealDim, l: "Submitted" }, "not-awarded": { c: C.red, b: C.redDim, l: "Not Awarded" },
    pending: { c: C.amber, b: C.amberDim, l: "Pending" }, open: { c: C.amber, b: C.amberDim, l: "Open" },
    flagged: { c: C.red, b: C.redDim, l: "Flagged" },
  }
  const x = m[s] || { c: C.textSub, b: C.bg3, l: s }
  return <Tag label={x.l} color={x.c} bg={x.b} />
}

const Btn = ({ children, onClick, variant = "primary", size = "md", disabled = false, style = {} }) => {
  const sz = { sm: { padding: "5px 11px", fontSize: 11 }, md: { padding: "8px 15px", fontSize: 13 }, lg: { padding: "11px 22px", fontSize: 14 } }
  const vr = {
    primary: { background: C.amber, color: "#0F1923" },
    secondary: { background: C.bg3, color: C.text, border: `1px solid ${C.border}` },
    ghost: { background: "transparent", color: C.textSub, border: `1px solid ${C.border}` },
    danger: { background: C.redDim, color: C.red, border: `1px solid ${C.red}44` },
    teal: { background: C.tealDim, color: C.teal, border: `1px solid ${C.teal}44` },
    green: { background: C.greenDim, color: C.green, border: `1px solid ${C.green}44` },
  }
  return (
    <button onClick={disabled ? undefined : onClick}
      style={{ border: "none", borderRadius: 7, fontFamily: "inherit", fontWeight: 600, cursor: disabled ? "not-allowed" : "pointer", opacity: disabled ? .5 : 1, transition: "opacity .15s", ...sz[size], ...vr[variant], ...style }}>
      {children}
    </button>
  )
}

const Inp = ({ value, onChange, placeholder, style = {}, type = "text", rows, onKeyDown }) => rows
  ? <textarea value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} rows={rows} onKeyDown={onKeyDown}
    style={{ background: C.bg2, border: `1px solid ${C.border}`, borderRadius: 7, padding: "9px 12px", fontSize: 13, color: C.text, fontFamily: "inherit", outline: "none", resize: "vertical", width: "100%", ...style }} />
  : <input type={type} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} onKeyDown={onKeyDown}
    style={{ background: C.bg2, border: `1px solid ${C.border}`, borderRadius: 7, padding: "9px 12px", fontSize: 13, color: C.text, fontFamily: "inherit", outline: "none", ...style }}
    onFocus={e => e.target.style.borderColor = C.amber} onBlur={e => e.target.style.borderColor = C.border} />

const Sel = ({ value, onChange, options, style = {} }) => (
  <select value={value} onChange={e => onChange(e.target.value)}
    style={{ background: C.bg2, border: `1px solid ${C.border}`, borderRadius: 7, padding: "9px 12px", fontSize: 13, color: C.text, fontFamily: "inherit", outline: "none", ...style }}>
    {options.map(o => <option key={o.value || o} value={o.value || o}>{o.label || o}</option>)}
  </select>
)

const Card = ({ children, style = {} }) => (
  <div style={{ background: C.bg2, border: `1px solid ${C.border}`, borderRadius: 12, ...style }}>{children}</div>
)

const Lbl = ({ children }) => (
  <div style={{ fontSize: 11, fontWeight: 700, color: C.textMuted, letterSpacing: 1, textTransform: "uppercase", fontFamily: "DM Mono, monospace", marginBottom: 5 }}>{children}</div>
)

const SHead = ({ title, sub, action }) => (
  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 22 }}>
    <div>
      <h1 style={{ fontFamily: "Syne, sans-serif", fontWeight: 800, fontSize: 22, color: C.white, margin: 0 }}>{title}</h1>
      {sub && <div style={{ fontSize: 13, color: C.textSub, marginTop: 3 }}>{sub}</div>}
    </div>
    {action && <div style={{ display: "flex", gap: 8 }}>{action}</div>}
  </div>
)

const CH = ({ children, style = {} }) => (
  <div style={{ fontSize: 11, fontWeight: 700, color: C.textMuted, letterSpacing: 1, textTransform: "uppercase", fontFamily: "DM Mono, monospace", ...style }}>{children}</div>
)

const Divider = () => <div style={{ height: 1, background: C.border, margin: "14px 0" }} />

const Modal = ({ open, onClose, title, children, width = 520 }) => {
  if (!open) return null
  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.75)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 2000, padding: 20 }}>
      <div onClick={e => e.stopPropagation()} style={{ background: C.bg2, border: `1px solid ${C.border}`, borderRadius: 14, width: "100%", maxWidth: width, maxHeight: "88vh", overflow: "auto" }}>
        <div style={{ padding: "16px 20px", borderBottom: `1px solid ${C.border}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div style={{ fontWeight: 800, fontSize: 16, color: C.text }}>{title}</div>
          <button onClick={onClose} style={{ background: "none", border: "none", color: C.textSub, fontSize: 20, cursor: "pointer" }}>✕</button>
        </div>
        <div style={{ padding: "20px" }}>{children}</div>
      </div>
    </div>
  )
}

const Gantt = ({ phases, week = 38 }) => {
  const total = 62
  return (
    <div style={{ overflowX: "auto" }}>
      <div style={{ minWidth: 640, fontFamily: "DM Mono, monospace" }}>
        {phases.map(ph => {
          const active = ph.start <= week && ph.start + ph.dur >= week
          return (
            <div key={ph.id} style={{ display: "flex", alignItems: "center", marginBottom: 7 }}>
              <div style={{ width: 140, fontSize: 11, color: active ? C.text : C.textSub, fontWeight: active ? 700 : 400, flexShrink: 0, paddingRight: 6, textAlign: "right", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{ph.name}</div>
              <div style={{ flex: 1, height: 20, background: C.bg3, borderRadius: 4, position: "relative", marginLeft: 4 }}>
                <div style={{ position: "absolute", left: `${(ph.start / total) * 100}%`, width: `${(ph.dur / total) * 100}%`, height: "100%", background: ph.color + (active ? "" : "88"), borderRadius: 4, display: "flex", alignItems: "center", paddingLeft: 6 }}>
                  <span style={{ fontSize: 9, color: "rgba(255,255,255,.85)", fontWeight: 700 }}>{ph.dur}w</span>
                </div>
                <div style={{ position: "absolute", left: `${(week / total) * 100}%`, top: -3, bottom: -3, width: 2, background: C.amber, borderRadius: 1 }} />
              </div>
            </div>
          )
        })}
        <div style={{ paddingLeft: 148, marginTop: 4, fontSize: 9, color: C.amber }}>▲ Week {week} (Now)</div>
      </div>
    </div>
  )
}

function Dashboard({ phases, tasks, rfis, rfps, bids }) {

  const openRFPs  = rfps.filter(r => r.status === 'open').length
  const pendingBids = bids.filter(b => b.status === 'submitted').length
  return (
    <div>
      <SHead title="Project Dashboard" sub="Byblos Mixed-Use Tower · BYB-2026-04" />
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 12, marginBottom: 24 }}>

      <Card style={{ padding: '18px', marginBottom: 20 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14 }}>

// ─── AGENDA ───────────────────────────────────────────────────────────────────
function Agenda({ tasks, meetings, showToast, addNotif }) {
  const [aiSugg, setAiSugg] = useState([])
  const [loading, setLoading] = useState(false)
  const openTasks = tasks.filter(t => t.status !== 'done')
  const upcoming  = meetings.filter(m => m.status === 'scheduled')

  const run = async () => {
    setLoading(true); setAiSugg([])
    const full = await callAI(
      'You are an AI construction project manager. Generate 4 specific actionable suggestions. Return ONLY a JSON array, each item: {action,reason,urgency,autoSendable}. No markdown, no explanation.',
      'Open tasks: ' + openTasks.map(t => t.name + ' due ' + t.due).join('; ') + '. Upcoming: ' + upcoming.map(m => m.title).join('; ') + '. Project: Byblos Mixed-Use Tower Week 38.',
      () => {}
    )
    try { setAiSugg(JSON.parse(full.replace(/```json|```/g, '').trim())) }
    catch {
      setAiSugg([
        { action: 'Send deadline reminder for Level 8 slab pour (Jun 15)',    reason: 'Due tomorrow, still in-progress',          urgency: 'high',   autoSendable: true  },
        { action: 'Follow up on RFI-031 curtain wall response',               reason: 'HIGH priority — potential 2-week delay',  urgency: 'high',   autoSendable: true  },
        { action: 'Get CO-011 client approval ($14,800)',                      reason: 'Blocking budget finalization',             urgency: 'medium', autoSendable: false },
        { action: 'Start monthly progress report draft',                       reason: 'Due Jun 25 — start early',                urgency: 'low',    autoSendable: false },
      ])
    }
    setLoading(false)
  }

  const uc = { high: C.red, medium: C.amber, low: C.green }
  return (
    <div>
      <SHead title="My Agenda" sub="Tasks, meetings, milestones, and AI suggestions"
        action={<Btn onClick={run} disabled={loading}>✦ {loading ? 'Thinking…' : 'AI Suggestions'}</Btn>} />
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 20, marginBottom: 24 }}>
        <Card style={{ padding: '16px' }}>

            <div key={t.id} className="row" style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '9px 10px', borderRadius: 7, marginBottom: 5, background: C.bg3, transition: 'background .15s' }}>
              <div style={{ width: 8, height: 8, borderRadius: '50%', background: t.priority === 'high' ? C.red : t.priority === 'medium' ? C.amber : C.green, flexShrink: 0 }} />
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 13 }}>{t.name}</div>
                <div style={{ fontSize: 10, color: C.textMuted }}>Due {t.due}</div>
              </div>
              <SPill s={t.status} />
            </div>
          ))}
        </Card>
        <div>
          <Card style={{ padding: '14px', marginBottom: 14 }}>
            <CH style={{ marginBottom: 10 }}>Scheduled Meetings</CH>
            {upcoming.length === 0 && <div style={{ fontSize: 13, color: C.textMuted }}>No upcoming meetings</div>}
            {upcoming.map(m => (
              <div key={m.id} style={{ padding: '9px 11px', background: C.bg3, borderRadius: 7, marginBottom: 6 }}>
                <div style={{ fontSize: 13, fontWeight: 600 }}>{m.title}</div>
                <div style={{ fontSize: 11, color: C.textSub, marginTop: 2 }}>📅 {m.date} at {m.time}</div>
              </div>
            ))}
          </Card>
          <Card style={{ padding: '14px' }}>
            <CH style={{ marginBottom: 10 }}>Key Milestones</CH>
            {[
              { label: 'Level 8 Slab Pour',  date: 'Jun 15', s: 'in-progress' },
              { label: 'RFI-031 Resolution', date: 'Jun 16', s: 'open' },
              { label: 'RFP-001 Closing',    date: 'Jul 15', s: 'open' },
            ].map(m => (
              <div key={m.label} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
                <div style={{ fontSize: 12 }}>{m.label}</div>
                <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
                  <span style={{ fontSize: 10, color: C.textMuted, fontFamily: 'DM Mono, monospace' }}>{m.date}</span>
                  <SPill s={m.s} />

        </div>
      </div>
      {aiSugg.length > 0 && (

          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 14 }}>
            <span style={{ color: C.amber, fontSize: 16 }}>✦</span>

          {aiSugg.map((s, i) => (
            <div key={i} style={{ background: C.bg3, borderRadius: 8, padding: '12px 14px', marginBottom: 8, borderLeft: `3px solid ${uc[s.urgency] || C.amber}` }}>

function PhasesView({ phases, setPhases, tasks, phasePhotos, setPhasePhotos, showToast, addNotif }) {
  const [addOpen, setAddOpen]   = useState(false)
  const [photoPhase, setPhotoPhase] = useState(null)
  const [newPhase, setNewPhase] = useState({ name: '', dur: 4, color: C.blue })
  const [cap, setCap]           = useState('')
  const COLS = [C.purple, C.blue, C.teal, C.amber, C.orange, C.green, C.red, '#EC4899']

  const add = () => {
    if (!newPhase.name) return
    const last = phases[phases.length - 1]
    setPhases(p => [...p, { id: 'ph' + Date.now(), name: newPhase.name, color: newPhase.color, start: last.start + last.dur, dur: newPhase.dur }])
    setAddOpen(false); showToast('Phase added')

// ─── RFI ──────────────────────────────────────────────────────────────────────
function RFIView({ rfis, setRfis, showToast, addNotif }) {
  const [sel, setSel]         = useState(null)
  const [aiAns, setAiAns]     = useState({})
  const [aiLoading, setAiLoading] = useState(false)
  const [addOpen, setAddOpen] = useState(false)
  const [newRFI, setNewRFI]   = useState({ subject: '', from: '', to: '', drawingRef: '', specRef: '', question: '', priority: 'medium' })
  const [filterS, setFilterS] = useState('all')
  const [search, setSearch]   = useState('')

  const filtered = rfis.filter(r => (filterS === 'all' || r.status === filterS) && (r.subject.toLowerCase().includes(search.toLowerCase()) || r.id.toLowerCase().includes(search.toLowerCase())))

  const draftAnswer = async rfi => {
    setAiLoading(true); setSel(rfi)
    await callAI(
      'You are a senior architect drafting a formal RFI response. Be technically precise, reference codes and drawing numbers, give a clear actionable answer. Format professionally.',
      `RFI: ${rfi.id}\nSubject: ${rfi.subject}\nDrawing: ${rfi.drawingRef}\nSpec: ${rfi.specRef}\nQuestion: ${rfi.question}\nProject: Byblos Mixed-Use Tower, 15-storey RC frame.`,
      c => setAiAns(a => ({ ...a, [rfi.id]: c }))
    )
    setAiLoading(false)
  }

  const issueAnswer = rfi => {
    const ans = aiAns[rfi.id]; if (!ans) return
    setRfis(r => r.map(x => x.id === rfi.id ? { ...x, status: 'answered', answer: ans } : x))
    addNotif(`RFI ${rfi.id} answered — ${rfi.from} notified`, 'rfi')
    showToast(`RFI ${rfi.id} issued`); setSel(null)
  }

  const add = () => {
    if (!newRFI.subject) return
    const r = { id: 'RFI-0' + (rfis.length + 33), ...newRFI, status: 'open', date: 'Jun 17', answer: '', costImpact: 'TBD', scheduleImpact: 'TBD' }
    setRfis(ri => [...ri, r])
    addNotif(`New RFI: ${r.subject}`, 'rfi')
    setAddOpen(false); setNewRFI({ subject: '', from: '', to: '', drawingRef: '', specRef: '', question: '', priority: 'medium' }); showToast('RFI created and assigned')
  }

  const pc = { high: C.red, medium: C.amber, low: C.green }
  const sc = { answered: C.green, open: C.amber, closed: C.textMuted }

  return (
    <div>
      <SHead title="Requests for Information (RFI)" sub="All project RFIs — tracked, logged, AI-assisted" action={<Btn onClick={() => setAddOpen(true)}>+ New RFI</Btn>} />
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 12, marginBottom: 20 }}>
        {[
          { label: 'Total RFIs', value: rfis.length, color: C.blue  },
          { label: 'Open',       value: rfis.filter(r => r.status === 'open').length,     color: C.amber },
          { label: 'Answered',   value: rfis.filter(r => r.status === 'answered').length, color: C.green },
        ].map(k => (
          <Card key={k.label} style={{ padding: '14px 16px', borderTop: `3px solid ${k.color}` }}>
            <div style={{ fontFamily: 'DM Mono, monospace', fontSize: 26, fontWeight: 700, color: k.color }}>{k.value}</div>
            <div style={{ fontSize: 12, color: C.textSub, marginTop: 3 }}>{k.label}</div>
          </Card>
        ))}
      </div>
      <div style={{ display: 'flex', gap: 8, marginBottom: 16 }}>
        {['all', 'open', 'answered'].map(s => (
          <button key={s} onClick={() => setFilterS(s)} style={{ padding: '5px 13px', background: filterS === s ? C.amber : C.bg2, border: `1px solid ${filterS === s ? C.amber : C.border}`, borderRadius: 20, fontSize: 11, fontWeight: 600, color: filterS === s ? '#0F1923' : C.textSub, cursor: 'pointer', fontFamily: 'inherit' }}>
            {s.charAt(0).toUpperCase() + s.slice(1)}
          </button>
        ))}
        <Inp value={search} onChange={setSearch} placeholder="🔍  Search…" style={{ marginLeft: 'auto', width: 200 }} />
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
        {filtered.map(rfi => (
          <div key={rfi.id} style={{ background: C.bg2, border: `1px solid ${sel?.id === rfi.id ? C.amber : C.border}`, borderRadius: 12, overflow: 'hidden', transition: 'border-color .2s' }}>
            <div onClick={() => setSel(sel?.id === rfi.id ? null : rfi)} style={{ padding: '14px 18px', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 12 }}>
              <div style={{ flex: 1 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 9, marginBottom: 5 }}>
                  <span style={{ fontFamily: 'DM Mono, monospace', fontSize: 12, fontWeight: 700, color: C.blue }}>{rfi.id}</span>
                  <Tag label={rfi.status.toUpperCase()} color={sc[rfi.status]} bg={(sc[rfi.status] || C.textSub) + '22'} />
                  <Tag label={rfi.priority.toUpperCase()} color={pc[rfi.priority]} bg={pc[rfi.priority] + '22'} />
                </div>
                <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 3 }}>{rfi.subject}</div>
                <div style={{ fontSize: 11, color: C.textSub }}>From: {rfi.from} → To: {rfi.to} · {rfi.date} · Dwg: {rfi.drawingRef}</div>
              </div>
              <span style={{ color: C.textSub }}>{sel?.id === rfi.id ? '▲' : '▼'}</span>
            </div>
            {sel?.id === rfi.id && (
              <div style={{ borderTop: `1px solid ${C.border}`, padding: '16px 18px', background: C.bg3 }}>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, marginBottom: 14 }}>
                  <div>
                    <div style={{ fontSize: 11, fontWeight: 700, color: C.textMuted, fontFamily: 'DM Mono, monospace', letterSpacing: 1, marginBottom: 6 }}>QUESTION</div>
                    <div style={{ fontSize: 13, color: C.text, lineHeight: 1.6 }}>{rfi.question}</div>
                  </div>
                  <div>
                    {[['Drawing Ref.', rfi.drawingRef], ['Spec Ref.', rfi.specRef], ['Cost Impact', rfi.costImpact], ['Schedule Impact', rfi.scheduleImpact]].map(([k, v]) => (
                      <div key={k} style={{ display: 'flex', gap: 10, marginBottom: 6 }}>
                        <span style={{ fontSize: 11, color: C.textMuted, width: 110, flexShrink: 0 }}>{k}:</span>
                        <span style={{ fontSize: 12, color: C.text }}>{v}</span>
                      </div>
                    ))}
                  </div>
                </div>
                {rfi.status === 'answered' && (
                  <div style={{ background: C.greenDim, border: `1px solid ${C.green}44`, borderRadius: 8, padding: '12px 14px' }}>
                    <div style={{ fontSize: 11, fontWeight: 700, color: C.green, fontFamily: 'DM Mono, monospace', marginBottom: 6 }}>OFFICIAL RESPONSE</div>
                    <div style={{ fontSize: 13, color: C.text, lineHeight: 1.6 }}>{rfi.answer}</div>
                  </div>
                )}
                {rfi.status === 'open' && (
                  aiAns[rfi.id] ? (
                    <div style={{ background: `${C.amber}10`, border: `1px solid ${C.amber}33`, borderRadius: 8, padding: '12px 14px' }}>
                      <div style={{ fontSize: 11, fontWeight: 700, color: C.amber, fontFamily: 'DM Mono, monospace', marginBottom: 8 }}>✦ AI DRAFT {aiLoading ? '▌' : '— REVIEW BEFORE ISSUING'}</div>
                      <div style={{ fontSize: 13, color: C.textSub, lineHeight: 1.65 }} dangerouslySetInnerHTML={{ __html: renderMd(aiAns[rfi.id]) }} />
                      {!aiLoading && (
                        <div style={{ display: 'flex', gap: 8, marginTop: 12 }}>
                          <Btn size="sm" variant="green" onClick={() => issueAnswer(rfi)} style={{ flex: 2 }}>✓ Approve &amp; Issue</Btn>
                          <Btn size="sm" variant="secondary" onClick={() => setAiAns(a => ({ ...a, [rfi.id]: '' }))}>Discard</Btn>
                          <Btn size="sm" onClick={() => draftAnswer(rfi)}>Regenerate</Btn>
                        </div>
                      )}
                    </div>
                  ) : (
                    <Btn onClick={() => draftAnswer(rfi)} disabled={aiLoading}>✦ {aiLoading ? 'Drafting…' : 'Draft AI Response'}</Btn>
                  )
                )}
              </div>
            )}
          </div>
        ))}
      </div>
      <Modal open={addOpen} onClose={() => setAddOpen(false)} title="New RFI" width={560}>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 13 }}>
          {[['Subject', 'subject', 'e.g. Curtain wall junction at L7'], ['From (Raised By)', 'from', 'e.g. Fadi Moussa (GC)'], ['To (Assigned To)', 'to', 'e.g. Leila Nassar (Arch.)'], ['Drawing Reference', 'drawingRef', 'e.g. A-710'], ['Spec Reference', 'specRef', 'e.g. Facade Spec §08 44 13']].map(([lbl, key, ph]) => (
            <div key={key}><Lbl>{lbl}</Lbl><Inp value={newRFI[key]} onChange={v => setNewRFI(r => ({ ...r, [key]: v }))} placeholder={ph} style={{ width: '100%' }} /></div>
          ))}
          <div><Lbl>Question</Lbl><Inp value={newRFI.question} onChange={v => setNewRFI(r => ({ ...r, question: v }))} placeholder="Describe the issue clearly…" rows={3} style={{ width: '100%' }} /></div>
          <div><Lbl>Priority</Lbl><Sel value={newRFI.priority} onChange={v => setNewRFI(r => ({ ...r, priority: v }))} options={['high', 'medium', 'low']} style={{ width: '100%' }} /></div>
          <div style={{ display: 'flex', gap: 9, marginTop: 4 }}><Btn onClick={() => setAddOpen(false)} variant="ghost" style={{ flex: 1 }}>Cancel</Btn><Btn onClick={add} disabled={!newRFI.subject} style={{ flex: 2 }}>Create &amp; Notify</Btn></div>
        </div>
      </Modal>
    </div>
  )
}

// ─── MEETINGS ─────────────────────────────────────────────────────────────────
function MeetingsView({ meetings, setMeetings, showToast, addNotif }) {
  const [addOpen, setAddOpen]   = useState(false)
  const [vcOpen, setVcOpen]     = useState(null)
  const [aiSumm, setAiSumm]     = useState({})
  const [genLoading, setGenLoading] = useState(false)
  const [newM, setNewM]         = useState({ title: '', date: '', time: '10:00', attendees: [] })

  const schedule = () => {
    if (!newM.title || !newM.date) return
    const m = { id: 'm' + Date.now(), ...newM, status: 'scheduled', summary: '', actions: [] }
    setMeetings(ms => [...ms, m])
    newM.attendees.forEach(() => addNotif(`Invited to "${newM.title}"`, 'meeting'))
    setAddOpen(false); setNewM({ title: '', date: '', time: '10:00', attendees: [] }); showToast('Meeting scheduled — attendees notified')
  }

  const generateSummary = async m => {
    setGenLoading(true)
    await callAI(
      'You are an AI meeting assistant. Generate a concise construction meeting summary: key decisions, 3-4 action items with assignee names and deadlines, and any risks flagged. Use markdown bullet points.',
      `Meeting: ${m.title}\nDate: ${m.date}\nAttendees: ${m.attendees.map(id => TEAM.find(t => t.id === id)?.name || id).join(', ')}\nProject: Byblos Mixed-Use Tower, Construction phase.`,
      c => setAiSumm(a => ({ ...a, [m.id]: c }))
    )
    setMeetings(ms => ms.map(x => x.id === m.id ? { ...x, status: 'completed' } : x))
    setGenLoading(false)
  }

  return (
    <div>
      <SHead title="Meetings" sub="Schedule, run, and get AI summaries" action={<Btn onClick={() => setAddOpen(true)}>+ Schedule Meeting</Btn>} />
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
        {meetings.map(m => {
          const att = m.attendees.map(id => TEAM.find(t => t.id === id)).filter(Boolean)
          const sum = aiSumm[m.id] || m.summary
          return (
            <Card key={m.id} style={{ overflow: 'hidden' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '14px 16px' }}>
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 700, fontSize: 14 }}>{m.title}</div>
                  <div style={{ fontSize: 11, color: C.textSub, marginTop: 3 }}>📅 {m.date} · {m.time} · {att.length} attendees</div>
                  <div style={{ display: 'flex', gap: 5, marginTop: 6 }}>{att.map(a => <Av key={a.id} initials={a.av} color={a.color} size={22} />)}</div>
                </div>
                <SPill s={m.status} />
                <div style={{ display: 'flex', gap: 7 }}>
                  <Btn size="sm" variant="teal" onClick={() => setVcOpen(m)}>🎥 Join</Btn>
                  {m.status === 'scheduled' && <Btn size="sm" onClick={() => generateSummary(m)} disabled={genLoading}>✦ AI Summary</Btn>}
                </div>
              </div>
              {sum && (
                <div style={{ borderTop: `1px solid ${C.border}`, padding: '12px 16px', background: C.bg3 }}>
                  <CH style={{ marginBottom: 8 }}>AI Summary</CH>
                  <div style={{ fontSize: 12, color: C.textSub, lineHeight: 1.65, maxHeight: 80, overflow: 'hidden', marginTop: 6 }} dangerouslySetInnerHTML={{ __html: renderMd(sum.substring(0, 300) + '…') }} />
                </div>
              )}
            </Card>
          )
        })}
      </div>
      <Modal open={addOpen} onClose={() => setAddOpen(false)} title="Schedule Meeting">
        <div style={{ display: 'flex', flexDirection: 'column', gap: 13 }}>
          <div><Lbl>Title</Lbl><Inp value={newM.title} onChange={v => setNewM(p => ({ ...p, title: v }))} placeholder="e.g. Weekly OAC #19" style={{ width: '100%' }} /></div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
            <div><Lbl>Date</Lbl><Inp value={newM.date} onChange={v => setNewM(p => ({ ...p, date: v }))} placeholder="Jun 20, 2026" style={{ width: '100%' }} /></div>
            <div><Lbl>Time</Lbl><Inp value={newM.time} onChange={v => setNewM(p => ({ ...p, time: v }))} placeholder="10:00" style={{ width: '100%' }} /></div>
          </div>
          <div><Lbl>Attendees</Lbl>
            {TEAM.map(t => (
              <label key={t.id} style={{ display: 'flex', alignItems: 'center', gap: 9, marginBottom: 7, cursor: 'pointer' }}>
                <input type="checkbox" checked={newM.attendees.includes(t.id)} onChange={e => setNewM(p => ({ ...p, attendees: e.target.checked ? [...p.attendees, t.id] : p.attendees.filter(x => x !== t.id) }))} style={{ accentColor: C.amber }} />
                <Av initials={t.av} color={t.color} size={22} />
                <span style={{ fontSize: 13 }}>{t.name} — {t.role}</span>
              </label>
            ))}
          </div>
          <div style={{ display: 'flex', gap: 9, marginTop: 4 }}><Btn onClick={() => setAddOpen(false)} variant="ghost" style={{ flex: 1 }}>Cancel</Btn><Btn onClick={schedule} disabled={!newM.title || !newM.date} style={{ flex: 2 }}>Schedule &amp; Notify</Btn></div>
        </div>
      </Modal>
      <Modal open={!!vcOpen} onClose={() => setVcOpen(null)} title={vcOpen?.title + ' — Video Call'} width={500}>
        {vcOpen && (
          <div>
            <div style={{ background: '#000', borderRadius: 10, height: 200, display: 'flex', flexWrap: 'wrap', gap: 4, padding: 8, marginBottom: 14 }}>
              {vcOpen.attendees.map(id => {
                const t = TEAM.find(x => x.id === id)
                return t ? <div key={id} style={{ flex: '1 1 calc(50% - 4px)', background: `${t.color}22`, border: `1px solid ${t.color}44`, borderRadius: 7, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 5 }}><Av initials={t.av} color={t.color} size={34} /><span style={{ fontSize: 10, color: C.text }}>{t.name}</span></div> : null
              })}
            </div>
            <div style={{ display: 'flex', justifyContent: 'center', gap: 10 }}>
              {['🎤', '📹', '💬', '🖥️', '⏺️'].map(i => <button key={i} style={{ background: C.bg3, border: `1px solid ${C.border}`, borderRadius: '50%', width: 42, height: 42, fontSize: 16, cursor: 'pointer' }}>{i}</button>)}
              <button onClick={() => setVcOpen(null)} style={{ background: C.redDim, border: `1px solid ${C.red}`, borderRadius: '50%', width: 42, height: 42, fontSize: 16, cursor: 'pointer', color: C.red }}>✕</button>
            </div>
            <div style={{ textAlign: 'center', fontSize: 11, color: C.textMuted, marginTop: 10 }}>Recording · Transcribing · AI summary on end call</div>
          </div>
        )}
      </Modal>
    </div>
  )
}

// ─── CONTRACTS ────────────────────────────────────────────────────────────────
function ContractsView({ showToast }) {
  const [contracts, setContracts] = useState([
    { id: 'C-001', title: 'Architectural Services Agreement', parties: ['u1', 'u2'], value: 280000,    status: 'signed',  date: 'Mar 1, 2026'  },
    { id: 'C-002', title: 'General Contractor Agreement',     parties: ['u2', 'u3'], value: 18400000,  status: 'signed',  date: 'May 15, 2026' },
    { id: 'C-003', title: 'MEP Sub-contract — Saad MEP',      parties: ['u3', 'u5'], value: 1200000,   status: 'signed',  date: 'Jun 1, 2026'  },
    { id: 'C-004', title: 'Legal Counsel Retainer',           parties: ['u2', 'u6'], value: 36000,     status: 'pending', date: 'Jun 10, 2026' },
  ])
  const [genOpen, setGenOpen]           = useState(false)
  const [analyzeId, setAnalyzeId]       = useState(null)
  const [genForm, setGenForm]           = useState({ type: 'Architectural Services', p1: 'u1', p2: 'u2', value: '' })
  const [genText, setGenText]           = useState('')
  const [genLoading, setGenLoading]     = useState(false)
  const [analysisText, setAnalysisText] = useState('')
  const [analysisLoading, setAnalysisLoading] = useState(false)

  const generate = async () => {
    setGenLoading(true); setGenText('')
    await callAI(
      'You are a construction law AI. Generate a professional concise contract in markdown. Include: parties, scope, payment terms, schedule, IP, dispute resolution, termination, signatures.',
      `Generate ${genForm.type} Agreement between ${TEAM.find(m => m.id === genForm.p1)?.name} and ${TEAM.find(m => m.id === genForm.p2)?.name} for Byblos Mixed-Use Tower. Value: $${genForm.value}. Date: June 2026.`,
      c => setGenText(c)
    )
    setGenLoading(false)
  }

  const analyze = async c => {
    setAnalyzeId(c.id); setAnalysisText(''); setAnalysisLoading(true)
    await callAI(
      'You are a construction contract analyzer. Explain in plain language: key risks, payment terms, delay penalties, termination conditions, dispute resolution. Use markdown with clear sections.',
      `Analyze: "${c.title}" — parties: ${c.parties.map(pid => TEAM.find(m => m.id === pid)?.name).join(' & ')}. Value: $${c.value.toLocaleString()}. Date: ${c.date}. Project: Byblos Mixed-Use Tower.`,
      c2 => setAnalysisText(c2)
    )
    setAnalysisLoading(false)
  }

  return (
    <div>
      <SHead title="Contracts" sub="Generate, analyze, sign, and store project contracts" action={<Btn onClick={() => setGenOpen(true)}>+ Generate Contract</Btn>} />
      <div style={{ display: 'flex', flexDirection: 'column', gap: 9 }}>
        {contracts.map(c => (
          <Card key={c.id} className="cardh" style={{ padding: '14px 16px', transition: 'border-color .2s' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
              <span style={{ fontSize: 24 }}>📄</span>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 14, fontWeight: 600 }}>{c.title}</div>
                <div style={{ fontSize: 11, color: C.textSub, marginTop: 2 }}>{c.parties.map(pid => TEAM.find(m => m.id === pid)?.name).join(' ↔ ')} · {c.date}</div>
              </div>
              <div style={{ fontFamily: 'DM Mono, monospace', fontSize: 14, fontWeight: 700, color: C.amber }}>${c.value.toLocaleString()}</div>
              <SPill s={c.status} />
              <Btn size="sm" variant="secondary" onClick={() => analyze(c)}>✦ Analyze</Btn>
              {c.status === 'pending' && <Btn size="sm" onClick={() => { setContracts(cc => cc.map(x => x.id === c.id ? { ...x, status: 'signed' } : x)); showToast('Contract signed digitally ✍️') }}>Sign ✍️</Btn>}
            </div>
            {analyzeId === c.id && analysisText && (
              <div style={{ borderTop: `1px solid ${C.border}`, padding: '12px 0 0', marginTop: 12 }}>
                <div style={{ fontSize: 13, color: C.textSub, lineHeight: 1.7 }} dangerouslySetInnerHTML={{ __html: renderMd(analysisText + (analysisLoading ? '▌' : '')) }} />
              </div>
            )}
          </Card>
        ))}
        <Card style={{ padding: '12px 16px', background: C.bg3 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between' }}>
            <span style={{ fontSize: 13, color: C.textSub }}>Total contracted (signed)</span>
            <span style={{ fontFamily: 'DM Mono, monospace', fontSize: 14, fontWeight: 700, color: C.green }}>${contracts.filter(c => c.status === 'signed').reduce((a, c) => a + c.value, 0).toLocaleString()}</span>
          </div>
        </Card>
      </div>
      <Modal open={genOpen} onClose={() => { setGenOpen(false); setGenText('') }} title="Generate Contract with AI" width={640}>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 13 }}>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
            <div><Lbl>Contract type</Lbl><Inp value={genForm.type} onChange={v => setGenForm(p => ({ ...p, type: v }))} placeholder="Architectural Services" style={{ width: '100%' }} /></div>
            <div><Lbl>Value ($)</Lbl><Inp value={genForm.value} onChange={v => setGenForm(p => ({ ...p, value: v }))} placeholder="280000" style={{ width: '100%' }} /></div>
            <div><Lbl>Party 1</Lbl><Sel value={genForm.p1} onChange={v => setGenForm(p => ({ ...p, p1: v }))} options={TEAM.map(m => ({ value: m.id, label: m.name }))} style={{ width: '100%' }} /></div>
            <div><Lbl>Party 2</Lbl><Sel value={genForm.p2} onChange={v => setGenForm(p => ({ ...p, p2: v }))} options={TEAM.map(m => ({ value: m.id, label: m.name }))} style={{ width: '100%' }} /></div>
          </div>
          <Btn onClick={generate} disabled={genLoading}>✦ {genLoading ? 'Generating…' : 'Generate with AI'}</Btn>
          {genText && <div style={{ background: C.bg3, border: `1px solid ${C.border}`, borderRadius: 8, padding: '14px', maxHeight: 260, overflowY: 'auto', fontSize: 12, lineHeight: 1.7, color: C.textSub }} dangerouslySetInnerHTML={{ __html: renderMd(genText + (genLoading ? '▌' : '')) }} />}
          {genText && !genLoading && (
            <div style={{ display: 'flex', gap: 9 }}>
              <Btn variant="ghost" onClick={() => setGenText('')} style={{ flex: 1 }}>Regenerate</Btn>
              <Btn onClick={() => { setContracts(cc => [...cc, { id: 'C-' + String(cc.length + 1).padStart(3, '0'), title: genForm.type + ' Agreement', parties: [genForm.p1, genForm.p2], value: parseInt(genForm.value) || 0, status: 'pending', date: 'Jun 17, 2026' }]); setGenOpen(false); setGenText(''); showToast('Contract created — sent for signature') }} style={{ flex: 2 }}>Send for Signature →</Btn>
            </div>
          )}
        </div>
      </Modal>
    </div>
  )
}

    </div>
  )
}

  const addComment = id => { if (!commentInput[id]?.trim()) return; setFeed(f => f.map(p => p.id === id ? { ...p, comments: [...p.comments, { user: 'u1', text: commentInput[id] }] } : p)); setCommentInput(c => ({ ...c, [id]: '' })) }
  const getMember = id => TEAM.find(t => t.id === id) || { name: 'Unknown', av: '?', color: C.textSub }
  return (
    <div style={{ maxWidth: 600, margin: '0 auto' }}>
      <SHead title="Feed" sub="Updates from your connected professionals" />
      <Card style={{ padding: '16px', marginBottom: 20 }}>
        <Inp value={newPost} onChange={setNewPost} placeholder="Share an update, milestone, or announcement…" rows={2} style={{ width: '100%', marginBottom: 10 }} />

          <div style={{ display: 'flex', gap: 8 }}>{['📷', '🎥', '📎'].map(i => <button key={i} style={{ background: 'none', border: 'none', fontSize: 18, cursor: 'pointer', color: C.textSub }}>{i}</button>)}</div>
          <Btn onClick={() => { if (!newPost.trim()) return; setFeed(f => [{ id: 'f' + Date.now(), user: 'u1', type: 'post', text: newPost, likes: 0, comments: [], time: 'just now', liked: false }, ...f]); setNewPost(''); showToast('Posted!') }} disabled={!newPost.trim()} size="sm">Post</Btn>
        </div>
      </Card>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
        {feed.map(p => { const m = getMember(p.user); return (
          <Card key={p.id} style={{ overflow: 'hidden' }}>
            <div style={{ padding: '14px 16px' }}>
              <div style={{ display: 'flex', gap: 10, alignItems: 'center', marginBottom: 12 }}>
                <Av initials={m.av} color={m.color} size={36} />
                <div><div style={{ fontWeight: 700, fontSize: 13 }}>{m.name}</div><div style={{ fontSize: 11, color: C.textMuted }}>{m.role} · {p.time}</div></div>
                {p.type === 'achievement' && <div style={{ marginLeft: 'auto' }}><Tag label="🏆 Achievement" color={C.amber} bg={C.amberDim} /></div>}
              </div>
              {p.project && <div style={{ fontSize: 11, color: C.blue, marginBottom: 8 }}>📌 {p.project}</div>}
              <div style={{ fontSize: 13, color: C.text, lineHeight: 1.65, marginBottom: 12 }}>{p.text}</div>
              <div style={{ display: 'flex', gap: 14, paddingTop: 10, borderTop: `1px solid ${C.border}` }}>
                <button onClick={() => like(p.id)} style={{ background: 'none', border: 'none', fontSize: 13, cursor: 'pointer', color: p.liked ? C.amber : C.textSub, fontWeight: p.liked ? 700 : 400, display: 'flex', alignItems: 'center', gap: 5 }}>{p.liked ? '❤️' : '🤍'} {p.likes}</button>
                <span style={{ fontSize: 13, color: C.textSub }}>💬 {p.comments.length}</span>
                <button onClick={() => showToast('Shared')} style={{ background: 'none', border: 'none', fontSize: 13, cursor: 'pointer', color: C.textSub }}>↗ Share</button>
              </div>
            </div>
            {p.comments.length > 0 && <div style={{ padding: '0 16px 10px', display: 'flex', flexDirection: 'column', gap: 6 }}>
              {p.comments.map((c, i) => { const cm = getMember(c.user); return <div key={i} style={{ display: 'flex', gap: 8 }}><Av initials={cm.av} color={cm.color} size={22} /><div style={{ background: C.bg3, borderRadius: 8, padding: '6px 10px', fontSize: 12, color: C.textSub, flex: 1 }}>{c.text}</div></div> })}
            </div>}
            <div style={{ padding: '8px 16px', borderTop: `1px solid ${C.border}`, display: 'flex', gap: 8 }}>
              <Inp value={commentInput[p.id] || ''} onChange={v => setCommentInput(c => ({ ...c, [p.id]: v }))} placeholder="Add a comment…" style={{ flex: 1 }} onKeyDown={e => e.key === 'Enter' && addComment(p.id)} />
              <Btn size="sm" variant="secondary" onClick={() => addComment(p.id)}>↑</Btn>
            </div>
          </Card>
        )})}
      </div>
    </div>
  )
}

function MarketplaceView({ orders, setOrders, showToast, addNotif }) {

    addNotif(`Order placed: ${item.name} from ${vendor.name} — $${total.toLocaleString()}`, 'payment')

function TeamBuilderView({ showToast }) {
  const [form, setForm] = useState({ budget: '', type: '', location: '', scope: '' })
  const [result, setResult] = useState('')
  const [loading, setLoading] = useState(false)
  const build = async () => {
    setLoading(true); setResult('')
    await callAI('You are an AI construction team builder. Given a project brief, recommend a complete team with roles, professionals, budget allocation per role, and rationale. Use markdown with clear sections.',
      `Build a construction team for:\n- Budget: $${form.budget}\n- Type: ${form.type}\n- Location: ${form.location}\n- Scope: ${form.scope}\n\nAvailable on BILT: ${TEAM.map(p => p.name + ' (' + p.role + ')').join(', ')}, ${VENDORS.map(v => v.name + ' (' + v.specialty + ')').join(', ')}\n\nRecommend team, fees per role, and total.`,
      c => setResult(c))
    setLoading(false)

  return (
    <div>
      <SHead title="✦ AI Team Builder" sub="Enter project parameters and AI assembles your ideal team" />
      <div style={{ display: 'grid', gridTemplateColumns: '360px 1fr', gap: 24, alignItems: 'start' }}>

            <div><Lbl>Project type</Lbl><Inp value={form.type} onChange={v => setForm(p => ({ ...p, type: v }))} placeholder="e.g. Luxury residential tower" style={{ width: '100%' }} /></div>
            <div><Lbl>Location</Lbl><Inp value={form.location} onChange={v => setForm(p => ({ ...p, location: v }))} placeholder="e.g. Beirut, Lebanon" style={{ width: '100%' }} /></div>
            <div><Lbl>Scope</Lbl><Inp value={form.scope} onChange={v => setForm(p => ({ ...p, scope: v }))} placeholder="e.g. 20 floors, rooftop pool, LEED" rows={3} style={{ width: '100%' }} /></div>
            <Btn onClick={build} disabled={loading || !form.budget || !form.type} size="lg" style={{ width: '100%' }}>✦ {loading ? 'Building…' : 'Build My Team'}</Btn>
          </div>
        </Card>
        <div>
          {!result && !loading && <Card style={{ padding: '40px', textAlign: 'center' }}>
            <div style={{ fontSize: 40, marginBottom: 16 }}>👥</div>
            <div style={{ fontWeight: 800, fontSize: 18, marginBottom: 8 }}>AI Team Builder</div>
            <div style={{ fontSize: 13, color: C.textSub, maxWidth: 360, margin: '0 auto' }}>Enter project parameters and AI assembles the optimal team with budget allocation and platform matches.</div>
          </Card>}
          {(result || loading) && <Card style={{ padding: '20px' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 14 }}><span style={{ color: C.amber, fontSize: 18 }}>✦</span><CH>Recommended Team</CH></div>
            <div style={{ fontSize: 13, color: C.textSub, lineHeight: 1.8 }} dangerouslySetInnerHTML={{ __html: renderMd(result + (loading ? '▌' : '')) }} />
            {result && !loading && <div style={{ marginTop: 16, display: 'flex', gap: 9 }}>
              <Btn onClick={() => showToast('Invites sent to all recommended professionals')}>Invite All to Project</Btn>
              <Btn variant="secondary" onClick={() => setResult('')}>Start Over</Btn>
            </div>}
          </Card>}
        </div>
      </div>
    </div>
  )
}

  const [aiRec, setAiRec] = useState('')
  const [aiLoading, setAiLoading] = useState(false)
  const rfp = rfps.find(r => r.id === selRFP)
  const rfpBids = bids.filter(b => b.rfpId === selRFP)
  const cc = { full:C.green, partial:C.amber, missing:C.red }
  const getAIRec = async () => {
    setAiLoading(true); setAiRec('')
    await callAI('You are an expert construction procurement advisor. Recommend the most suitable bidder. Cover price, compliance, technical score, delivery, ESG. Use markdown bullet points.',

      c => setAiRec(c))
    setAiLoading(false)
  }
  return (
    <div>

function SupplierScorecard({ bids, showToast }) {

  const metrics = ['Delivery Speed', 'Communication', 'Product Quality', 'Documentation']
  const avg = id => { const sc = scores[id]; if (!sc) return 0; const v = Object.values(sc); return v.length ? (v.reduce((a,b)=>a+b,0)/v.length).toFixed(1) : 0 }
  return (
    <div>
      <SHead title="Supplier Scorecards" sub="Post-fulfillment ratings — feeds into reputation scores" />
      {awarded.length === 0 && <Card style={{ padding:'40px', textAlign:'center' }}><div style={{ color:C.textSub }}>No awarded bids yet.</div></Card>}
      {awarded.map(b => (
        <Card key={b.id} style={{ padding:'18px', marginBottom:14 }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16 }}>
            <div><div style={{ fontWeight:700, fontSize:15 }}>{b.vendorName}</div><div style={{ fontSize:12, color:C.textSub, marginTop:2 }}>{b.rfpId} · ${b.totalPrice.toLocaleString()}</div></div>
            {avg(b.id) > 0 && <div style={{ textAlign:'center' }}><div style={{ fontFamily:'DM Mono, monospace', fontSize:32, fontWeight:700, color:C.amber }}>{avg(b.id)}</div><div style={{ fontSize:10, color:C.textMuted }}>Avg Score</div></div>}
          </div>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(2,1fr)', gap:12 }}>
            {metrics.map(m => (
              <div key={m} style={{ background:C.bg3, borderRadius:8, padding:'12px' }}>
                <div style={{ fontSize:12, fontWeight:600, marginBottom:8 }}>{m}</div>
                <div style={{ display:'flex', gap:5 }}>
                  {[1,2,3,4,5].map(star => <span key={star} onClick={() => setScores(s=>({...s,[b.id]:{...(s[b.id]||{}),[m]:star}}))} style={{ fontSize:22, cursor:'pointer', color:(scores[b.id]?.[m]||0)>=star?C.amber:C.bg4 }}>★</span>)}
                </div>
              </div>

          {Object.keys(scores[b.id]||{}).length===metrics.length && <button onClick={() => showToast(`Scorecard submitted for ${b.vendorName}`)} style={{ marginTop:12, width:'100%', padding:'10px', background:C.amber, border:'none', borderRadius:7, fontSize:13, fontWeight:700, cursor:'pointer', fontFamily:'inherit', color:'#0F1923' }}>Submit Scorecard → Update Reputation</button>}
        </Card>
      ))}
    </div>
  )
}

function BidBuilderWizard({ rfps, bids, setBids, showToast }) {
  const [step, setStep] = useState(1)
  const [selRFP, setSelRFP] = useState(rfps.find(r=>r.status==='open')?.id||'')
  const [bidItems, setBidItems] = useState([])
  const [certs, setCerts] = useState({})
  const [notes, setNotes] = useState('')
  const [delivery, setDelivery] = useState('')
  const [errors, setErrors] = useState([])
  const rfp = rfps.find(r => r.id === selRFP)
  const openRFPs = rfps.filter(r => r.status === 'open')
  const initBid = () => { if(rfp){ setBidItems(rfp.lineItems.map(li=>({...li,unitPrice:''}))); setCerts(Object.fromEntries(rfp.requiredCerts.map(c=>[c,false]))); setStep(2) } }
  const validate = () => {
    const errs = []
    bidItems.forEach((item,i) => { if (!item.unitPrice) errs.push(`Line item ${i+1} (${item.desc}) — unit price missing`) })
    rfp?.requiredCerts.forEach(c => { if (!certs[c]) errs.push(`Certification missing: ${c}`) })
    if (!delivery) errs.push('Delivery timeline required')
    setErrors(errs); return errs.length === 0
  }
  const submit = () => {
    if (!validate()) { setStep(4); return }
    const total = bidItems.reduce((a,b)=>a+(parseFloat(b.unitPrice)||0)*(b.qty||0),0)
    const newBid = { id:'BID-'+String(bids.length+1).padStart(3,'0'), rfpId:selRFP, vendorName:'TechGlass Solutions', submitted:'Jun 17', status:'submitted', totalPrice:total, deliveryWeeks:parseInt(delivery)||12, technicalScore:85, lineItems:bidItems.map(li=>({...li,unitPrice:parseFloat(li.unitPrice)||0})), certs:Object.keys(certs).filter(c=>certs[c]), notes, compliance:Object.values(certs).every(Boolean)?'full':'partial', financialHealth:88, esgScore:79 }
    setBids(b=>[...b,newBid]); showToast('Bid submitted!'); setStep(5)
  }
  const steps = ['Select RFP','Line Items','Certifications','Pre-flight','Submitted']
  return (
    <div>
      <SHead title="Guided Bid Builder" sub="AI-assisted multi-step bid wizard with pre-flight validation" />
      <div style={{ display:'flex', gap:0, marginBottom:28, background:C.bg2, border:`1px solid ${C.border}`, borderRadius:10, overflow:'hidden' }}>
        {steps.map((lbl,i) => <div key={i} style={{ flex:1, padding:'10px 8px', textAlign:'center', background:step===i+1?C.amber:step>i+1?C.greenDim:C.bg2, borderRight:i<4?`1px solid ${C.border}`:'none' }}>
          <div style={{ fontSize:11, fontWeight:700, color:step===i+1?'#0F1923':step>i+1?C.green:C.textMuted }}>{step>i+1?'✓':i+1}</div>
          <div style={{ fontSize:10, color:step===i+1?'#0F1923':step>i+1?C.green:C.textMuted, marginTop:2 }}>{lbl}</div>
        </div>)}
      </div>
      {step===1 && <Card style={{ padding:'24px' }}>
        <div style={{ fontWeight:700, fontSize:16, marginBottom:16 }}>Select an RFP to bid on</div>
        <div style={{ display:'flex', flexDirection:'column', gap:10, marginBottom:20 }}>
          {openRFPs.map(r => <div key={r.id} onClick={() => setSelRFP(r.id)} style={{ padding:'14px 16px', background:selRFP===r.id?`${C.amber}18`:C.bg3, border:`1.5px solid ${selRFP===r.id?C.amber:C.border}`, borderRadius:8, cursor:'pointer' }}>
            <div style={{ fontWeight:600, fontSize:14 }}>{r.title}</div>
            <div style={{ fontSize:12, color:C.textSub, marginTop:3 }}>{r.id} · Budget: {r.budget} · Closes: {r.closing}</div>
          </div>)}
        </div>
        <Btn onClick={initBid} disabled={!selRFP}>Continue to Pricing →</Btn>
      </Card>}
      {step===2 && rfp && <Card style={{ padding:'24px' }}>
        <div style={{ fontWeight:700, fontSize:16, marginBottom:16 }}>Price Each Line Item — {rfp.title}</div>
        <table style={{ width:'100%', borderCollapse:'collapse', marginBottom:20 }}>
          <thead><tr style={{ borderBottom:`1px solid ${C.border}` }}>{['Description','Unit','Qty','Your Unit Price','Line Total'].map(h=><th key={h} style={{ padding:'8px 12px', textAlign:'left', fontSize:11, color:C.textMuted, fontWeight:700, fontFamily:'DM Mono, monospace' }}>{h}</th>)}</tr></thead>
          <tbody>
            {bidItems.map((item,i) => <tr key={i} style={{ borderBottom:`1px solid ${C.border}` }}>
              <td style={{ padding:'10px 12px', fontSize:13 }}>{item.desc}</td>
              <td style={{ padding:'10px 12px', fontSize:12, color:C.textSub, fontFamily:'DM Mono, monospace' }}>{item.unit}</td>
              <td style={{ padding:'10px 12px', fontSize:12, fontFamily:'DM Mono, monospace' }}>{item.qty}</td>
              <td style={{ padding:'10px 12px' }}><input value={item.unitPrice} onChange={e => setBidItems(it=>it.map((x,j)=>j===i?{...x,unitPrice:e.target.value}:x))} placeholder="0.00" style={{ width:'100%', background:C.bg3, border:`1px solid ${!item.unitPrice?C.red+'66':C.border}`, borderRadius:6, padding:'7px 10px', fontSize:13, color:C.text, fontFamily:'DM Mono, monospace', outline:'none' }} /></td>
              <td style={{ padding:'10px 12px', fontFamily:'DM Mono, monospace', fontSize:13, color:C.amber, fontWeight:600 }}>${((parseFloat(item.unitPrice)||0)*(item.qty||0)).toLocaleString()}</td>
            </tr>)}
            <tr style={{ background:C.bg3 }}>
              <td colSpan={4} style={{ padding:'12px', fontWeight:700 }}>TOTAL BID VALUE</td>
              <td style={{ padding:'12px', fontFamily:'DM Mono, monospace', fontSize:16, fontWeight:700, color:C.amber }}>${bidItems.reduce((a,b)=>a+(parseFloat(b.unitPrice)||0)*(b.qty||0),0).toLocaleString()}</td>
            </tr>
          </tbody>
        </table>
        <div style={{ marginBottom:20 }}><Lbl>Delivery Timeline (weeks)</Lbl><Inp value={delivery} onChange={setDelivery} placeholder="e.g. 10" style={{ width:180 }} /></div>
        <div style={{ display:'flex', gap:9 }}><Btn onClick={() => setStep(1)} variant="ghost" style={{ flex:1 }}>← Back</Btn><Btn onClick={() => setStep(3)} style={{ flex:2 }}>Continue to Certifications →</Btn></div>
      </Card>}
      {step===3 && rfp && <Card style={{ padding:'24px' }}>
        <div style={{ fontWeight:700, fontSize:16, marginBottom:16 }}>Upload Required Certifications</div>
        <div style={{ display:'flex', flexDirection:'column', gap:10, marginBottom:20 }}>
          {rfp.requiredCerts.map(cert => <div key={cert} onClick={() => setCerts(c=>({...c,[cert]:!c[cert]}))} style={{ display:'flex', alignItems:'center', gap:14, padding:'14px 16px', background:certs[cert]?C.greenDim:C.bg3, border:`1.5px solid ${certs[cert]?C.green:C.border}`, borderRadius:8, cursor:'pointer' }}>
            <div style={{ width:22, height:22, borderRadius:4, background:certs[cert]?C.green:C.bg4, border:`1.5px solid ${certs[cert]?C.green:C.border2}`, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>{certs[cert]&&<span style={{ color:'white', fontSize:12, fontWeight:700 }}>✓</span>}</div>
            <div style={{ flex:1 }}><div style={{ fontSize:13, fontWeight:600 }}>{cert}</div><div style={{ fontSize:11, color:C.textSub, marginTop:2 }}>{certs[cert]?'✓ Uploaded':'Click to mark as uploaded'}</div></div>
            {!certs[cert]&&<span style={{ fontSize:11, color:C.red, fontWeight:700 }}>REQUIRED</span>}
          </div>)}
        </div>
        <div style={{ marginBottom:20 }}><Lbl>Additional Notes</Lbl><Inp value={notes} onChange={setNotes} rows={3} placeholder="Differentiators, warranties, team details…" style={{ width:'100%' }} /></div>
        <div style={{ display:'flex', gap:9 }}><Btn onClick={() => setStep(2)} variant="ghost" style={{ flex:1 }}>← Back</Btn><Btn onClick={() => { validate(); setStep(4) }} style={{ flex:2 }}>Pre-flight Check →</Btn></div>
      </Card>}
      {step===4 && <Card style={{ padding:'24px' }}>
        <div style={{ fontWeight:700, fontSize:16, marginBottom:16 }}>Pre-flight Validation</div>
        {errors.length > 0 ? <>
          <div style={{ background:C.redDim, border:`1px solid ${C.red}44`, borderRadius:10, padding:'16px', marginBottom:20 }}>
            <div style={{ fontWeight:700, fontSize:14, color:C.red, marginBottom:10 }}>⚠ {errors.length} issue{errors.length>1?'s':''} found</div>
            {errors.map((e,i) => <div key={i} style={{ fontSize:13, color:C.red, marginBottom:5 }}>• {e}</div>)}
          </div>
          <Btn onClick={() => setStep(2)}>← Fix Issues</Btn>
        </> : <>
          <div style={{ background:C.greenDim, border:`1px solid ${C.green}44`, borderRadius:10, padding:'16px', marginBottom:20 }}>
            <div style={{ fontWeight:700, fontSize:14, color:C.green, marginBottom:10 }}>✓ All checks passed — ready to submit</div>
            {['All line items priced','All certifications uploaded','Delivery timeline set'].map(c => <div key={c} style={{ fontSize:13, color:C.green, marginBottom:4 }}>✓ {c}</div>)}
          </div>
          <div style={{ display:'flex', gap:9 }}><Btn onClick={() => setStep(3)} variant="ghost" style={{ flex:1 }}>← Review</Btn><Btn onClick={submit} variant="green" style={{ flex:2 }}>✓ Submit Bid</Btn></div>
        </>}
      </Card>}
      {step===5 && <Card style={{ padding:'40px', textAlign:'center', borderColor:`${C.green}44` }}>
        <div style={{ fontSize:48, marginBottom:16 }}>🎉</div>
        <div style={{ fontFamily:'Syne, sans-serif', fontWeight:800, fontSize:22, color:C.green, marginBottom:8 }}>Bid Submitted!</div>
        <div style={{ fontSize:14, color:C.textSub, marginBottom:24 }}>Your bid has been received. The buyer will notify you of their decision.</div>
        <Btn onClick={() => setStep(1)}>Submit Another Bid</Btn>
      </Card>}
    </div>
  )
}

function MyPOs({ pos, setPos, showToast }) {
  return (
    <div>
      <SHead title="My Purchase Orders" sub="View and acknowledge incoming POs" />
      {pos.map(po => (
        <div key={po.id} style={{ background:C.bg2, border:`1px solid ${C.border}`, borderRadius:12, padding:'18px', marginBottom:12 }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:14 }}>
            <div>
              <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:5 }}>
                <span style={{ fontFamily:'DM Mono, monospace', fontWeight:700, color:C.blue }}>{po.id}</span>
                <SPill s={po.status} />
              </div>
              <div style={{ fontWeight:700, fontSize:15 }}>{po.vendorName}</div>
              <div style={{ fontSize:12, color:C.textSub, marginTop:2 }}>Issued: {po.issuedDate} · Delivery: {po.deliveryDate}</div>
            </div>
            <div style={{ fontFamily:'DM Mono, monospace', fontSize:22, fontWeight:700, color:C.amber }}>${po.totalValue.toLocaleString()}</div>
          </div>
          {po.lineItems && <table style={{ width:'100%', borderCollapse:'collapse', marginBottom:14, fontSize:12 }}>
            <thead><tr style={{ borderBottom:`1px solid ${C.border}` }}>{['Description','Qty','Unit Price','Total'].map(h=><th key={h} style={{ padding:'8px 10px', textAlign:'left', color:C.textMuted, fontWeight:700, fontFamily:'DM Mono, monospace' }}>{h}</th>)}</tr></thead>
            <tbody>{po.lineItems.map((li,i)=><tr key={i} style={{ borderBottom:`1px solid ${C.border}` }}><td style={{ padding:'8px 10px' }}>{li.desc}</td><td style={{ padding:'8px 10px', fontFamily:'DM Mono, monospace' }}>{li.qty} {li.unit}</td><td style={{ padding:'8px 10px', fontFamily:'DM Mono, monospace' }}>${li.unitPrice?.toLocaleString()}</td><td style={{ padding:'8px 10px', fontFamily:'DM Mono, monospace', color:C.amber, fontWeight:600 }}>${li.total?.toLocaleString()}</td></tr>)}</tbody>
          </table>}
          {po.status !== 'acknowledged' && <button onClick={() => { setPos(p=>p.map(x=>x.id===po.id?{...x,status:'acknowledged'}:x)); showToast('PO acknowledged digitally') }} style={{ padding:'10px 20px', background:C.green, border:'none', borderRadius:7, fontSize:13, fontWeight:700, cursor:'pointer', fontFamily:'inherit', color:'white' }}>✓ Acknowledge &amp; Accept PO</button>}
        </div>
      ))}
      {pos.length === 0 && <Card style={{ padding:'40px', textAlign:'center' }}><div style={{ color:C.textMuted }}>No POs received yet.</div></Card>}
    </div>
  )
}

function FulfillmentTracker({ pos, setPos, showToast }) {
  const statuses = ['not-started','in-production','quality-check','shipped','delivered']
  const labels = { 'not-started':'Not Started','in-production':'In Production','quality-check':'Quality Check','shipped':'Shipped','delivered':'Delivered' }
  return (
    <div>
      <SHead title="Fulfillment Tracker" sub="Update order status and attach tracking details" />
      {pos.filter(p=>p.status==='acknowledged').map(po => (
        <div key={po.id} style={{ background:C.bg2, border:`1px solid ${C.border}`, borderRadius:12, padding:'18px', marginBottom:14 }}>
          <div style={{ fontWeight:700, fontSize:15, marginBottom:4 }}>{po.id} — {po.vendorName}</div>
          <div style={{ fontSize:12, color:C.textSub, marginBottom:16 }}>${po.totalValue.toLocaleString()} · Delivery: {po.deliveryDate}</div>
          <div style={{ display:'flex', gap:0, marginBottom:20, borderRadius:8, overflow:'hidden' }}>
            {statuses.map((s,i) => { const activeIdx=statuses.indexOf(po.fulfillmentStatus); const done=i<=activeIdx; return <div key={s} style={{ flex:1, padding:'10px 4px', background:done?C.green:C.bg3, borderRight:i<4?`1px solid ${C.bg2}`:'none', textAlign:'center', fontSize:9, fontWeight:700, color:done?'white':C.textMuted, cursor:'pointer' }} onClick={() => { setPos(p=>p.map(x=>x.id===po.id?{...x,fulfillmentStatus:s,goodsReceived:s==='delivered'}:x)); showToast(`Status: ${labels[s]}`) }}>{done?'✓':i+1}<br />{labels[s].split(' ')[0]}</div> })}
          </div>
          <div style={{ display:'flex', gap:10 }}>
            <input placeholder="Tracking number (e.g. UPS 1Z999AA1…)" style={{ flex:1, background:C.bg3, border:`1px solid ${C.border}`, borderRadius:7, padding:'9px 12px', fontSize:12, color:C.text, fontFamily:'inherit', outline:'none' }} />
            <button onClick={() => showToast('Packing slip attached')} style={{ padding:'9px 14px', background:C.bg3, border:`1px solid ${C.border}`, borderRadius:7, fontSize:12, fontWeight:600, color:C.textSub, cursor:'pointer', fontFamily:'inherit' }}>📎 Attach Slip</button>
          </div>
        </div>
      ))}
      {pos.filter(p=>p.status==='acknowledged').length===0 && <Card style={{ padding:'40px', textAlign:'center' }}><div style={{ color:C.textMuted }}>No acknowledged POs to track yet.</div></Card>}
    </div>
  )
}

function EInvoice({ pos, showToast, addNotif }) {
  const [generated, setGenerated] = useState({})
  const generate = po => {
    setGenerated(g=>({...g,[po.id]:true}))
    addNotif(`Invoice generated for PO ${po.id} — $${po.totalValue.toLocaleString()}. Ready to send.`, 'payment')
    showToast(`Invoice auto-generated from PO ${po.id}`)
  }
  return (
    <div>
      <SHead title="One-Click E-Invoicing" sub="Auto-generate invoices from PO data — zero manual entry" />
      {pos.filter(p=>p.status==='acknowledged').map(po => (
        <div key={po.id} style={{ background:C.bg2, border:`1px solid ${C.border}`, borderRadius:12, overflow:'hidden', marginBottom:14 }}>
          <div style={{ padding:'14px 18px', borderBottom:`1px solid ${C.border}`, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
            <div><div style={{ fontWeight:700, fontSize:15 }}>Invoice for {po.id}</div><div style={{ fontSize:12, color:C.textSub, marginTop:2 }}>Source: Purchase Order · Auto-populated</div></div>
            {!generated[po.id] ? <Btn onClick={() => generate(po)}>⚡ Generate Invoice</Btn> : <span style={{ fontSize:12, fontWeight:700, color:C.green }}>✓ Generated</span>}
          </div>
          {generated[po.id] && <div style={{ padding:'18px' }}>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:16, fontSize:12, color:C.textSub }}>
              {[['Invoice No.','INV-'+po.id],['PO Reference',po.id],['Vendor',po.vendorName],['Issue Date','Jun 17, 2026'],['Payment Terms','Net 30'],['Bank Details','Account linked in profile']].map(([k,v]) => <div key={k}><div style={{ fontWeight:700, fontSize:10, color:C.textMuted, fontFamily:'DM Mono, monospace', marginBottom:2 }}>{k}</div><div style={{ color:C.text }}>{v}</div></div>)}
            </div>
            {po.lineItems && <table style={{ width:'100%', borderCollapse:'collapse', marginBottom:16, fontSize:12 }}>
              <thead><tr style={{ background:C.bg3, borderBottom:`1px solid ${C.border}` }}>{['Description','Qty','Unit Price','Amount'].map(h=><th key={h} style={{ padding:'8px 12px', textAlign:'left', color:C.textMuted, fontWeight:700, fontFamily:'DM Mono, monospace' }}>{h}</th>)}</tr></thead>
              <tbody>{po.lineItems.map((li,i)=><tr key={i} style={{ borderBottom:`1px solid ${C.border}` }}><td style={{ padding:'9px 12px' }}>{li.desc}</td><td style={{ padding:'9px 12px', fontFamily:'DM Mono, monospace' }}>{li.qty}</td><td style={{ padding:'9px 12px', fontFamily:'DM Mono, monospace' }}>${li.unitPrice?.toLocaleString()}</td><td style={{ padding:'9px 12px', fontFamily:'DM Mono, monospace', fontWeight:600, color:C.amber }}>${li.total?.toLocaleString()}</td></tr>)}</tbody>
              <tfoot><tr style={{ background:C.bg3 }}><td colSpan={3} style={{ padding:'11px 12px', fontWeight:700 }}>TOTAL DUE</td><td style={{ padding:'11px 12px', fontFamily:'DM Mono, monospace', fontSize:16, fontWeight:700, color:C.amber }}>${po.totalValue.toLocaleString()}</td></tr></tfoot>
            </table>}
            <div style={{ display:'flex', gap:9 }}>
              <Btn onClick={() => showToast('Invoice sent to buyer')} style={{ flex:2 }}>📨 Send to Buyer</Btn>
              <Btn variant="secondary" onClick={() => showToast('Exported as PDF')} style={{ flex:1 }}>↓ PDF</Btn>
            </div>
          </div>}
        </div>
      ))}
      {pos.filter(p=>p.status==='acknowledged').length===0 && <Card style={{ padding:'40px', textAlign:'center' }}><div style={{ color:C.textMuted }}>Acknowledge a PO first to generate invoices.</div></Card>}
    </div>
  )
}

// ── App.jsx ──────────────────────────────────







function App() {
  const [user, setUser]           = useState(null)
  const [app, setApp]             = useState('build')
  const [bidApp, setBidApp]       = useState(false)
  const [bView, setBView]         = useState('dashboard')
  const [fView, setFView]         = useState('discover')
  const [phases, setPhases]       = useState(PHASES_DEF)
  const [tasks, setTasks]         = useState(TASKS_INIT)
  const [subs, setSubs]           = useState(SUBS_INIT)
  const [rfis, setRfis]           = useState(RFI_INIT)
  const [rfps, setRfps]           = useState(RFP_INIT)
  const [bids, setBids]           = useState(BIDS_INIT)
  const [pos, setPos]             = useState(POS_INIT)
  const [feed, setFeed]           = useState(FEED_INIT)
  const [meetings, setMeetings]   = useState(MEETINGS_INIT)
  const [orders, setOrders]       = useState([])
  const [notifs, setNotifs]       = useState(NOTIFS_INIT)
  const [teamMembers, setTeamMembers] = useState(TEAM)
  const [phasePhotos, setPhasePhotos] = useState({ ca: [{ id: 'ph1', url: 'https://images.unsplash.com/photo-1504307651254-35680f356dfd?w=300&q=80', caption: 'Level 7 formwork', user: 'u4', time: 'Jun 10' }] })
  const [notifOpen, setNotifOpen] = useState(false)
  const [msgOpen, setMsgOpen]     = useState(false)
  const [msgThread, setMsgThread] = useState('u3')
  const [aiOpen, setAiOpen]       = useState(false)
  const [toast, setToast]         = useState(null)

  const showToast = (msg, type = 'success') => { setToast({ msg, type }); setTimeout(() => setToast(null), 3200) }
  const addNotif  = (text, type = 'system') => setNotifs(n => [{ id: Date.now(), type, text, time: 'just now', unread: true }, ...n])

  const awardBid = (bid, rfp) => {
    setBids(b => b.map(x => x.id === bid.id ? { ...x, status: 'awarded' } : x.rfpId === rfp.id && x.id !== bid.id ? { ...x, status: 'not-awarded' } : x))
    setRfps(r => r.map(x => x.id === rfp.id ? { ...x, status: 'awarded', awardedTo: bid.id } : x))
    const newPO = { id: 'PO-' + String(pos.length + 2).padStart(3, '0'), bidId: bid.id, rfpId: rfp.id, vendorName: bid.vendorName, issuedDate: 'Jun 17, 2026', deliveryDate: `${bid.deliveryWeeks} weeks`, totalValue: bid.totalPrice, status: 'pending-ack', fulfillmentStatus: 'not-started', lineItems: bid.lineItems.map(li => ({ ...li, total: li.qty * (li.unitPrice || 0) })), goodsReceived: false, invoiceSubmitted: false }
    setPos(p => [...p, newPO])
    setTasks(t => [...t, { id: 't' + Date.now(), name: `Review ${bid.vendorName} Safety Manual`, phase: 'ca', assignee: 'u1', status: 'open', due: 'Jun 24', priority: 'high' }])
    setSubs(s => [...s, { id: 'SUB-AWARD-' + bid.id, name: `${rfp.title} — Award Pack`, phase: 'ca', assignee: 'u1', status: 'approved', locked: false, fee: 0, due: 'Jun 20', paid: true }])
    setFeed(f => [{ id: 'feed-' + Date.now(), user: 'u2', type: 'achievement', text: `🏆 ${rfp.title} awarded to ${bid.vendorName} for $${bid.totalPrice.toLocaleString()}. PO ${newPO.id} issued.`, project: 'BYB-2026-04', likes: 0, comments: [], time: 'just now', liked: false }, ...f])
    setTeamMembers(tm => tm.map(m => m.name === bid.vendorName ? { ...m, bidsWon: (m.bidsWon || 0) + 1, totalVolume: (m.totalVolume || 0) + bid.totalPrice, partners: [...new Set([...(m.partners || []), 'Khoury Dev Group'])] } : m))
    addNotif(`🏆 Bid awarded to ${bid.vendorName} — PO ${newPO.id} generated. 5 modules auto-updated.`, 'bid')
    showToast(`Award complete! PO ${newPO.id} generated.`)
  }

  if (!user) return <Auth onAuth={setUser} />
  if (bidApp) return <BidProcApp onClose={() => setBidApp(false)} tasks={tasks} setTasks={setTasks} subs={subs} setSubs={setSubs} showToast={showToast} addNotif={addNotif} rfps={rfps} setRfps={setRfps} bids={bids} setBids={setBids} pos={pos} setPos={setPos} teamMembers={teamMembers} awardBid={awardBid} />

  const unread = notifs.filter(n => n.unread).length

  return (
    <div style={{ display: 'flex', height: '100vh', fontFamily: 'Inter, sans-serif', background: C.bg, color: C.text, overflow: 'hidden' }}>
      {toast && <div style={{ position: 'fixed', top: 18, left: '50%', transform: 'translateX(-50%)', background: toast.type === 'success' ? C.greenDim : C.redDim, border: `1px solid ${toast.type === 'success' ? C.green : C.red}`, borderRadius: 8, padding: '10px 20px', fontSize: 13, color: C.text, zIndex: 9999, fontWeight: 600, whiteSpace: 'nowrap' }}>{toast.type === 'success' ? '✓' : '✕'} {toast.msg}</div>}

      <Sidebar app={app} setApp={setApp} bView={bView} setBView={setBView} fView={fView} setFView={setFView} user={user} unread={unread} notifOpen={notifOpen} setNotifOpen={setNotifOpen} msgOpen={msgOpen} setMsgOpen={setMsgOpen} aiOpen={aiOpen} setAiOpen={setAiOpen} onBidApp={() => setBidApp(true)} />

      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
        <div style={{ background: C.bg2, borderBottom: `1px solid ${C.border}`, padding: '0 22px', height: 52, display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexShrink: 0 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <div style={{ width: 7, height: 7, borderRadius: '50%', background: C.amber }} />
            <span style={{ fontFamily: 'DM Mono, monospace', fontSize: 11, color: C.textSub, letterSpacing: 1 }}>BYB-2026-04</span>
            <span style={{ color: C.border }}>·</span>
            <span style={{ fontSize: 13, color: C.textSub }}>Byblos Mixed-Use Tower</span>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, cursor: 'pointer' }} onClick={() => { setApp('find'); setFView('profile') }}>
            <div style={{ width: 28, height: 28, borderRadius: '50%', background: (user.color || C.purple) + '22', border: `1.5px solid ${(user.color || C.purple)}55`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 10, fontWeight: 700, color: user.color || C.purple, fontFamily: 'DM Mono, monospace' }}>{user.av || 'LN'}</div>
            <span style={{ fontSize: 13, fontWeight: 600 }}>{user.name || 'Leila Nassar'}</span>
            <span style={{ fontSize: 11, color: C.textMuted }}>→ Profile</span>
          </div>
        </div>

        <div style={{ flex: 1, overflowY: 'auto', padding: '22px' }}>
          {app === 'build' && <>
            {bView === 'dashboard'  && <Dashboard  phases={phases} tasks={tasks} rfis={rfis} rfps={rfps} bids={bids} />}
            {bView === 'agenda'     && <Agenda     tasks={tasks} meetings={meetings} showToast={showToast} addNotif={addNotif} />}
            {bView === 'phases'     && <PhasesView phases={phases} setPhases={setPhases} tasks={tasks} phasePhotos={phasePhotos} setPhasePhotos={setPhasePhotos} showToast={showToast} addNotif={addNotif} />}
            {bView === 'tasks'      && <TasksView  tasks={tasks} setTasks={setTasks} phases={phases} showToast={showToast} />}
            {bView === 'submittals' && <SubsView   subs={subs} setSubs={setSubs} showToast={showToast} />}
            {bView === 'rfis'       && <RFIView    rfis={rfis} setRfis={setRfis} showToast={showToast} addNotif={addNotif} />}
            {bView === 'meetings'   && <MeetingsView meetings={meetings} setMeetings={setMeetings} showToast={showToast} addNotif={addNotif} />}
            {bView === 'contracts'  && <ContractsView showToast={showToast} />}
            {bView === 'budget'     && <BudgetView orders={orders} />}
            {bView === 'team'       && <TeamView   teamMembers={teamMembers} setTeamMembers={setTeamMembers} showToast={showToast} />}
            {bView === 'documents'  && <DocsEngine showToast={showToast} />}
            {bView === 'risks'      && <RiskView   showToast={showToast} />}
            {bView === 'ai-log'     && <AILogView  tasks={tasks} subs={subs} rfis={rfis} showToast={showToast} />}
          </>}
          {app === 'find' && <>
            {fView === 'discover'     && <DiscoverView  showToast={showToast} addNotif={addNotif} />}
            {fView === 'feed'         && <FeedView      feed={feed} setFeed={setFeed} showToast={showToast} />}
            {fView === 'marketplace'  && <MarketplaceView orders={orders} setOrders={setOrders} showToast={showToast} addNotif={addNotif} />}
            {fView === 'profile'      && <ProfileView  user={user} feed={feed} teamMembers={teamMembers} showToast={showToast} />}
            {fView === 'team-builder' && <TeamBuilderView showToast={showToast} />}
          </>}
        </div>
      </div>

      {notifOpen && <NotifPanel notifs={notifs} setNotifs={setNotifs} onClose={() => setNotifOpen(false)} />}
      {msgOpen   && <MsgPanel   thread={msgThread} setThread={setMsgThread} onClose={() => setMsgOpen(false)} showToast={showToast} />}
      {aiOpen    && <AIAssistant tasks={tasks} subs={subs} rfis={rfis} onClose={() => setAiOpen(false)} />}
    </div>
  )
}

// ── Entry point ──────────────────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
<script type="module" src="script.js"></script>
</body>
